$kind: http-request
name: http://localhost:5001/sol/auth/login
method: POST
url: 'http://localhost:5001/sol/auth/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "username": "Githaiga",
      "password": "Githaiga10"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const response = pm.response.json();

      const template = `
        <style>
          body { font-family: Arial, sans-serif; padding: 16px; }
          table { border-collapse: collapse; width: 100%; }
          th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
          th { background-color: #4CAF50; color: white; }
          tr:nth-child(even) { background-color: #f2f2f2; }
          tr:hover { background-color: #ddd; }
          .title { font-size: 18px; font-weight: bold; margin-bottom: 12px; }
        </style>
        <div class="title">Response Visualization</div>
        <table>
          {{#if isArray}}
            <thead>
              <tr>
                {{#each headers}}
                  <th>{{this}}</th>
                {{/each}}
              </tr>
            </thead>
            <tbody>
              {{#each rows}}
                <tr>
                  {{#each this}}
                    <td>{{this}}</td>
                  {{/each}}
                </tr>
              {{/each}}
            </tbody>
          {{else}}
            <thead>
              <tr><th>Key</th><th>Value</th></tr>
            </thead>
            <tbody>
              {{#each pairs}}
                <tr><td>{{key}}</td><td>{{value}}</td></tr>
              {{/each}}
            </tbody>
          {{/if}}
        </table>
      `;

      let data;

      if (Array.isArray(response)) {
        const headers = response.length > 0 ? Object.keys(response[0]) : [];
        const rows = response.map(item => headers.map(h => {
          const val = item[h];
          return (typeof val === 'object' && val !== null) ? JSON.stringify(val) : String(val ?? '');
        }));
        data = { isArray: true, headers, rows };
      } else {
        const pairs = Object.entries(response).map(([key, value]) => ({
          key,
          value: (typeof value === 'object' && value !== null) ? JSON.stringify(value) : String(value ?? '')
        }));
        data = { isArray: false, pairs };
      }

      pm.visualizer.set(template, data);